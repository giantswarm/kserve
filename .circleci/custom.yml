# Repo-specific CircleCI jobs. The dynamic-config setup workflow in
# .circleci/config.yml deep-merges this file into the generated
# .circleci/workflows.yml at pipeline runtime (yq `*+`: maps merge, job lists
# append). devctl never touches this file.
#
# What this file carries beyond the golden pipeline: the three OCI-only Helm
# charts this repo publishes. The generator's single-chart app-catalog pipeline
# (one chart named after the repo, pushed to the app catalog with ATS tests)
# does not fit -- this repo ships three charts with non-repo names straight to
# the OCI registry (push_to_oci_registry, push_to_appcatalog: false) and no ATS.
# The `app` flavour is therefore dropped in team-bumblebee.yaml so the generator
# emits no chart jobs, and the charts live here verbatim.
version: 2.1

workflows:
  build:
    jobs:
    # Chart: kserve-resources (controller + config)
    - architect/push-to-app-catalog:
        context: architect
        name: build-kserve-resources-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: kserve-resources
        push_to_appcatalog: false
        push_to_oci_registry: true
        explicit_allow_chart_name_mismatch: true
        persist_chart_archive: true
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
              - main

    # Chart: kserve-crd
    - architect/push-to-app-catalog:
        context: architect
        name: build-kserve-crd-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: kserve-crd
        push_to_appcatalog: false
        push_to_oci_registry: true
        explicit_allow_chart_name_mismatch: true
        persist_chart_archive: true
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
              - main

    # Chart: kserve-runtime-configs (ClusterServingRuntimes)
    - architect/push-to-app-catalog:
        context: architect
        name: build-kserve-runtime-configs-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: kserve-runtime-configs
        push_to_appcatalog: false
        push_to_oci_registry: true
        explicit_allow_chart_name_mismatch: true
        persist_chart_archive: true
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
              - main
