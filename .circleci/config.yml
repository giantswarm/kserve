version: 2.1

orbs:
  architect: giantswarm/architect@9.3.1

workflows:
  build:
    jobs:
      # Branch builds: amd64 only for faster PR feedback.
      # The Dockerfile is self-contained (clones upstream and cross-compiles),
      # so no go-build step is needed.
      - architect/push-to-registries:
          context: architect
          name: push-to-registries
          image: giantswarm/kserve-controller
          platforms: "linux/amd64"
          force-public: true
          filters:
            branches:
              ignore:
                - main

      # Tag builds: full multi-arch (amd64 + arm64). split-china-push skips
      # the Aliyun mirror; the sync-china-registry job below mirrors the image
      # from gsoci to Aliyun via the in-China galaxy-runner.
      - architect/push-to-registries:
          context: architect
          name: push-to-registries-release
          image: giantswarm/kserve-controller
          force-public: true
          split-china-push: true
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      # Mirror gsoci -> Aliyun via the in-China giantswarm/galaxy-runner.
      - architect/sync-china-registry:
          context: architect
          name: sync-china-registry
          image: giantswarm/kserve-controller
          requires:
            - push-to-registries-release
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      # Chart: kserve-resources (controller + config)
      - architect/push-to-app-catalog:
          context: architect
          name: build-kserve-resources-chart
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: kserve-resources
          push_to_appcatalog: false
          push_to_oci_registry: true
          explicit_allow_chart_name_mismatch: true
          persist_chart_archive: true
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore:
                - main

      # Chart: kserve-crd
      - architect/push-to-app-catalog:
          context: architect
          name: build-kserve-crd-chart
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: kserve-crd
          push_to_appcatalog: false
          push_to_oci_registry: true
          explicit_allow_chart_name_mismatch: true
          persist_chart_archive: true
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore:
                - main

      # Chart: kserve-runtime-configs (ClusterServingRuntimes)
      - architect/push-to-app-catalog:
          context: architect
          name: build-kserve-runtime-configs-chart
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: kserve-runtime-configs
          push_to_appcatalog: false
          push_to_oci_registry: true
          explicit_allow_chart_name_mismatch: true
          persist_chart_archive: true
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore:
                - main
